name: CI — Task Manager

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Lint & Type-check
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Tests + Coverage + Artifacts
  # ════════════════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Required for SonarCloud blame info

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: Upload HTML coverage report (Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-report
          path: coverage/lcov-report/
          retention-days: 30

      - name: Upload XML reports (Artifact — for SonarQube)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml-reports
          path: |
            coverage/lcov.info
            coverage/cobertura-coverage.xml
            coverage/junit.xml
            coverage/clover.xml
          retention-days: 30

      - name: Upload full coverage dir (Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-full
          path: coverage/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — SonarCloud Analysis
  # ════════════════════════════════════════════════════════════════════════════
  sonar:
    name: 📊 SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests to regenerate reports
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_task-manager
            -Dsonar.organization=${{ github.repository_owner }}
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.testExecutionReportPaths=coverage/junit.xml
            -Dsonar.qualitygate.wait=true

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 — Docker Build (optional, on push to main only)
  # ════════════════════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push — validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: task-manager:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
