cat > sonar-project.properties << 'EOF'
sonar.projectKey=lucizzs_Project_Architectura
sonar.organization=lucizzs
sonar.projectName=TaskFlow (In-Memory)
sonar.projectVersion=2.0.0
sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/reports/**,tests/integration/**
sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/node_modules/**,**/dist/**
sonar.sourceEncoding=UTF-8
EOF

git add sonar-project.properties
git commit -m "fix: sonar project key"
git push